name: test

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic
      - name: Run tests
        run: PYTHONPATH=packages/newgeo_core python -m unittest discover -s api/tests -v
